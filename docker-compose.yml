version: '3.8'

services:
  pansou:
    image: ghcr.io/fish2018/pansou:latest
    container_name: pansou
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      - PORT=8888
      - CHANNELS=tgsearchers3,BaiduCloudDisk,bdwpzhpd,SharePanBaidu,share_pan,Lsp115,QukanMovie,shares_115,Channel_Shares_115,yunpanuc,alyp_1,alyp_TV,alyp_JLP,alyp_4K_Movies,alyp_Animation,Quark_Movies,NewQuark,yunpanqk,PanjClub,jdjdn1111,MCPH01,shareAliyun,Aliyun_4K_Movies,zaihuayun,NewAliPan,yp123pan,xx123pan,zyfb123,zyzhpd123,xx123pan1,yingshifenxiang123,cloud189_group,tyypzhpd,tianyirigeng,cloudtianyi,ydypzyfx,yunpan139,yunpansall,yppshare,leopansou,KFCYeah,leoziyuan,tgsearchers2,xunleiyunpan,taoxgzy,ResourceUniverse,Aliyun_4K_Movies,Oscar_4Kmovies,vip115hot,yggpan,ucquark,yunpanxunlei,xlshare,peccxin,peccxinpd,BaiduCloudDiskchat,MCPH086,kuakeclound,Q66Share
      - CACHE_ENABLED=true
      - CACHE_PATH=/app/cache
      - CACHE_MAX_SIZE=100
      - CACHE_TTL=60
      - ASYNC_PLUGIN_ENABLED=true
      - ASYNC_RESPONSE_TIMEOUT=4
      - ASYNC_MAX_BACKGROUND_WORKERS=20
      - ASYNC_MAX_BACKGROUND_TASKS=100
      - ASYNC_CACHE_TTL_HOURS=1
      # 如果需要代理，取消下面的注释并设置代理地址
      # - PROXY=socks5://proxy:7897
    volumes:
      - pansou-cache:/app/cache
    networks:
      - pansou-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8888/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # 如果需要代理，取消下面的注释
  # proxy:
  #   image: ghcr.io/snail007/goproxy:latest
  #   container_name: pansou-proxy
  #   restart: unless-stopped
  #   command: /proxy socks -p :7897
  #   networks:
  #     - pansou-network

volumes:
  pansou-cache:
    name: pansou-cache

networks:
  pansou-network:
    name: pansou-network 
